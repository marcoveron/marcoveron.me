name: Desplegar a GitHub Pages

on:
  # Se despliega en cada push a la rama principal.
  push:
    branches: [main]
  # Permite lanzarlo manualmente desde la pestaña Actions.
  workflow_dispatch:

# Permisos que necesita la action oficial de GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build con Astro
        uses: withastro/action@v3
        with:
          # Astro 7 requiere Node >= 22.12; el action usa Node 20 por defecto.
          node-version: 22
        # Detecta el gestor de paquetes automáticamente (usa package-lock.json).

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
