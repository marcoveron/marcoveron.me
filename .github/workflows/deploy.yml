name: Desplegar a GitHub Pages

on:
  # Se despliega en cada push a la rama principal.
  push:
    branches: [main]
  # Permite lanzarlo manualmente desde la pestaña Actions.
  workflow_dispatch:

# Permisos que necesita la action oficial de GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build con Astro
        uses: withastro/action@v6
        # v6 usa Node 24 por defecto (Astro 6 requiere Node >=22.12) y detecta
        # el gestor de paquetes automáticamente a partir de package-lock.json.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
